<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polish Phrasebook</title>
    <meta
      name="description"
      content="Listen to common Polish phrases for greetings, travel, food, and polite conversation."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="pageTitle">
      <section class="intro">
        <div>
          <p class="eyebrow">Polish phrasebook</p>
          <h1 id="pageTitle">Listen, repeat, and use the phrase.</h1>
          <p>
            Common Polish phrases for greetings, ordering, travel, and asking for help. Tap any
            phrase to hear it spoken in Polish.
          </p>
        </div>

        <label class="speed-control">
          <span>Playback speed</span>
          <strong id="speedValue">0.85x</strong>
          <input id="speedControl" type="range" min="0.6" max="1.1" step="0.05" value="0.85" />
        </label>
      </section>

      <section class="player" aria-live="polite">
        <div>
          <p>Now listening</p>
          <h2 id="currentPolish">Dzień dobry</h2>
          <span id="currentEnglish">Good morning</span>
          <strong id="currentPronunciation">jen DOH-bri</strong>
        </div>
        <button id="playCurrent" class="play-main" type="button" aria-label="Play current phrase">
          ▶
        </button>
      </section>

      <nav id="categories" class="categories" aria-label="Phrase categories"></nav>
      <section id="phraseGrid" class="phrase-grid" aria-label="Polish phrases"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
